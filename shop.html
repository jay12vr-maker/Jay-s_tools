<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimension3D - Custom 3D Prints</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Three.js for 3D visual elements -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
        }


        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.4;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);

            border-color: #38bdf8;
        }

        .gradient-text {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Notification Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #38bdf8;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;

            z-index: 100;
            right: 30px;
            bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        .sync-icon.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }

            to { transform: rotate(360deg); }
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Navigation -->
    <nav class="flex items-center justify-between px-8 py-6 sticky top-0 z-50 bg-slate-900/50 backdrop-blur-md border-b border-white/5">
        <div class="text-2xl font-extrabold tracking-tighter flex items-center gap-2">

            <span class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">3D</span>
            Dimension3D
        </div>
        <div class="flex items-center gap-8">
            <a href="index.html" class="hover:text-sky-400 transition font-medium">Home</a>
            <a href="#shop" class="hover:text-sky-400 transition font-medium">Shop</a>
            <button onclick="toggleCart()" class="relative bg-sky-500 hover:bg-sky-600 px-4 py-2 rounded-full flex items-center gap-2 font-semibold transition">
                Cart <span id="cart-count" class="bg-white text-sky-600 text-xs rounded-full w-5 h-5 flex items-center justify-center">0</span>
            </button>
        </div>
    </nav>

    <!-- Hero -->
    <section class="px-8 py-24 max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
        <div>
            <h1 class="text-6xl lg:text-8xl font-black mb-6 leading-tight">
                Your Ideas <br>
                <span class="gradient-text">Printed to Life.</span>
            </h1>

            <p class="text-slate-400 text-xl mb-10 max-w-lg">
                High-precision 3D printing services synced live from your custom Google Sheets inventory.
            </p>
            <div class="flex gap-4">
                <a href="#shop" class="bg-white text-slate-900 px-8 py-4 rounded-xl font-bold text-lg hover:bg-sky-400 hover:text-white transition">Shop Now</a>
                <button onclick="window.open('https://youtube.com/watch?v=fOg2nvHkfT8')" class="border border-white/20 px-8 py-4 rounded-xl font-bold text-lg hover:bg-white/10 transition">Setup Guide</button>
            </div>
        </div>
        <div class="relative hidden lg:block">
            <img src="https://images.unsplash.com/photos/3d-printer-with-tools-and-creations-in-workshop-X-Q7NAwnwE0" alt="3D Printer" class="rounded-3xl shadow-2xl rotate-3 scale-95 border border-white/10">
        </div>
    </section>

    <!-- Shop Section -->
    <section id="shop" class="px-8 py-20 max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-4">
            <div>
                <div class="flex items-center gap-3 mb-2">
                    <h2 class="text-4xl font-bold">Inventory</h2>

                    <span id="conn-status" class="status-badge bg-slate-700 text-slate-400">Initializing...</span>
                </div>
                <p class="text-slate-400">Manage your stock in Google Sheets and see it update here.</p>
            </div>
            <div class="flex flex-col items-end gap-2">
                <div class="text-xs text-slate-500 bg-slate-800/50 px-4 py-2 rounded-full border border-white/5">
                    Sync Time: <span id="sync-time">None</span>
                </div>
                <button onclick="fetchProducts()" class="flex items-center gap-2 text-xs font-bold text-sky-400 hover:text-sky-300 transition uppercase tracking-widest">
                    <svg id="sync-btn-icon" class="w-4 h-4 sync-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                    Fetch Latest Data
                </button>
            </div>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
            <!-- Products load here -->
        </div>
    </section>


    <!-- Cart Sidebar -->
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-slate-900 shadow-2xl z-[100] translate-x-full transition-transform duration-300 border-l border-white/10">
        <div class="p-8 flex flex-col h-full">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-2xl font-bold">Your Cart</h3>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-white text-2xl">✕</button>
            </div>
            <div id="cart-items" class="flex-grow overflow-y-auto space-y-4"></div>
            <div class="mt-8 pt-8 border-t border-white/10">
                <div class="flex justify-between text-xl font-bold mb-6">
                    <span>Total</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button onclick="checkout()" class="w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-4 rounded-xl transition">Checkout</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>


    <script>
        // YOUR SPREADSHEET LINK
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRVrA_8ndp0w3vWU_rwfKKNFsECqNMN6yW9yHN2VTOXRCIP5kQa1tLznW4DBmEasd_KR-LXcBcKNz9s/pub?gid=0&single=true&output=csv';
        
        // These will only show if the Sheet can't be reached
        const DEMO_ITEMS = [
            { id: 'd1', name: "Example Item (Demo)", price: 10.00, image: "https://images.unsplash.com/photos/7FTY5qqyKHg", description: "This is sample data. Connect your sheet to see real items." }
        ];

        let cart = [];

        async function fetchProducts() {
            const icon = document.getElementById('sync-btn-icon');
            const statusBadge = document.getElementById('conn-status');
            icon.classList.add('loading');
            
            try {
                // Using a proxy might be needed in some sandboxed environments, 
                // but let's try direct first.

                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('Sheet unreachable');
                
                const csvText = await response.text();
                const products = parseSafeCSV(csvText);
                
                if (products.length > 0) {
                    statusBadge.innerText = "Connected";
                    statusBadge.className = "status-badge bg-green-500/20 text-green-400 border border-green-500/50";
                    renderProducts(products);
                } else {
                    statusBadge.innerText = "Sheet Empty";
                    statusBadge.className = "status-badge bg-yellow-500/20 text-yellow-400 border border-yellow-500/50";
                    renderProducts(DEMO_ITEMS);
                }
            } catch (err) {
                console.error(err);
                statusBadge.innerText = "Offline Mode (Demo)";
                statusBadge.className = "status-badge bg-orange-500/20 text-orange-400 border border-orange-500/50";

                renderProducts(DEMO_ITEMS);
                showToast("Note: Using demo data (Sync blocked by browser).");
            } finally {
                icon.classList.remove('loading');
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString();
            }
        }

        // Improved CSV Parser that handles basic quoted strings
        function parseSafeCSV(text) {
            const lines = text.split(/\r?\n/);
            const data = [];
            // Skip header row
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                // Matches standard CSV columns (handles some quoted commas)
                const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

                
                data.push({
                    id: i,
                    name: (parts[0] || "No Name").replace(/"/g, ''),
                    price: parseFloat(parts[1]) || 0,
                    description: (parts[2] || "No description").replace(/"/g, ''),
                    image: (parts[3] || "").replace(/"/g, '').trim() || 'https://placehold.co/600x400/1e293b/ffffff?text=Missing+Image'
                });
            }
            return data;
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="glass-card rounded-3xl overflow-hidden flex flex-col h-full">
                    <div class="aspect-square overflow-hidden bg-slate-800">
                        <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover transition-transform duration-700 hover:scale-110">
                    </div>

                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold leading-tight">${p.name}</h3>
                            <span class="text-sky-400 font-bold">$${p.price.toFixed(2)}</span>
                        </div>
                        <p class="text-slate-400 text-xs mb-6 flex-grow line-clamp-3">${p.description}</p>
                        <button onclick="addToCart('${p.id}', '${p.name.replace(/'/g, "\\'")}', ${p.price})" class="w-full bg-sky-500 hover:bg-sky-600 py-3 rounded-xl font-bold transition">
                            Add to Cart
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id, name, price) {
            cart.push({ id, name, price });
            updateCartUI();
            showToast(`${name} added to cart!`);
        }


        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const cartItems = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p class="text-slate-500 text-center py-10">Cart is empty.</p>';
                totalEl.innerText = '$0.00';
                return;
            }

            cartItems.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-white/5 p-4 rounded-xl">
                    <div class="text-sm font-semibold">${item.name}</div>
                    <button onclick="removeFromCart(${index})" class="text-red-400 hover:text-red-200">✕</button>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + item.price, 0);

            totalEl.innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = "show";
            setTimeout(() => { toast.className = ""; }, 3000);
        }


        function checkout() {
            if (cart.length === 0) return showToast("Add items first!");
            showToast("Opening Checkout...");
        }

        // 3D Background Logic
        function initThree() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const shapes = [];
            const geo = new THREE.BoxGeometry(1,1,1);
            const mat = new THREE.MeshBasicMaterial({ color: 0x38bdf8, wireframe: true });

            for(let i=0; i<30; i++) {
                const mesh = new THREE.Mesh(geo, mat);

                mesh.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*30, (Math.random()-0.5)*30);
                mesh.rotation.set(Math.random(), Math.random(), Math.random());
                scene.add(mesh);
                shapes.push(mesh);
            }

            camera.position.z = 15;

            function animate() {
                requestAnimationFrame(animate);
                shapes.forEach(s => { s.rotation.x += 0.005; s.rotation.y += 0.005; });
                renderer.render(scene, camera);
            }
            animate();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);

            });
        }

        window.onload = () => {
            initThree();
            fetchProducts();
        };
    </script>
</body>
</html>
